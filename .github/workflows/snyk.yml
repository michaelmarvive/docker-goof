name: Snyk Security

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  snyk-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t docker-goof:ci -f Dockerfile .

      - uses: snyk/actions/setup@v1.0.0

      - name: Snyk Container test
        run: snyk container test docker-goof:ci --file=Dockerfile
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  snyk-iac:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/setup@v1.0.0

      - name: Snyk IaC test (Dockerfiles and IaC in repo)
        run: snyk iac test .
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
